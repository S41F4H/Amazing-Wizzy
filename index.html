<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazing Wizzy — Main Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#0d1b2a;
    --sky-mid:#1b2f4a;
    --forest-dark:#0f2e22;
    --forest-mid:#1b4332;
    --forest-light:#2d6a4f;
    --leaf-glow:#52b788;
    --gold:#ffd60a;
    --gold-dim:#b8860b;
    --violet:#e0aaff;
    --parchment:#f1faee;
    --wood-dark:#3a2418;
    --wood-mid:#5c3a21;
    --wood-light:#7a4f2a;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    width:100%; height:100%;
    overflow:hidden;
    font-family:'VT323', monospace;
  }

  body{
    position:relative;
    background:#0d1b2a;
  }

  /* ---------- BACKGROUND ARTWORK ---------- */
  .bg-scene{
    position:absolute; inset:0;
    background-image:url('assets/images/bg-forest.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
  }

  /* soft dark vignette so UI stays readable over the artwork */
  .bg-vignette{
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(13,27,42,.15) 0%, rgba(13,27,42,0) 30%, rgba(13,27,42,.35) 75%, rgba(13,27,42,.65) 100%);
  }

  /* firefly particles */
  .firefly{
    position:absolute;
    width:4px; height:4px;
    background:var(--gold);
    box-shadow:0 0 6px 2px rgba(255,214,10,.8);
    border-radius:50%;
    animation:float-firefly 6s ease-in-out infinite;
    opacity:0;
  }
  @keyframes float-firefly{
    0%{ opacity:0; transform:translate(0,0); }
    15%{ opacity:1; }
    50%{ transform:translate(20px,-30px); }
    85%{ opacity:1; }
    100%{ opacity:0; transform:translate(-10px,-60px); }
  }

  /* ---------- MAIN CONTENT ---------- */
  .stage{
    position:relative;
    width:100%; height:100%;
    display:flex; flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding-top:6vh;
  }

  .logo-wrap{
    position:relative;
    text-align:center;
    margin-bottom:2vh;
    z-index:2;
  }

  .logo-img{
    width:min(94vw, 520px);
    height:auto;
    filter: drop-shadow(0 0 22px rgba(255,214,10,.6)) drop-shadow(0 0 46px rgba(255,214,10,.3));
    animation:glow-pulse 2.4s ease-in-out infinite;
  }
  @keyframes glow-pulse{
    0%,100%{ filter:drop-shadow(0 0 22px rgba(255,214,10,.6)) drop-shadow(0 0 46px rgba(255,214,10,.3)); }
    50%{ filter:drop-shadow(0 0 34px rgba(255,214,10,.85)) drop-shadow(0 0 60px rgba(255,214,10,.45)); }
  }

  /* ---------- WOODEN SIGNPOST PANEL ---------- */
  .menu-panel{
    position:relative;
    z-index:2;
    background:var(--wood-mid);
    border:4px solid var(--wood-dark);
    box-shadow:
      inset 0 0 0 3px var(--wood-light),
      0 8px 0 var(--wood-dark),
      0 10px 20px rgba(0,0,0,.5);
    padding:22px 26px;
    display:flex; flex-direction:column; gap:14px;
    min-width:260px;
  }

  .menu-btn{
    font-family:'Press Start 2P', monospace;
    font-size:13px;
    color:var(--parchment);
    background:var(--forest-mid);
    border:none;
    padding:14px 18px;
    cursor:pointer;
    text-align:center;
    letter-spacing:1px;
    position:relative;
    box-shadow:
      inset -3px -3px 0 rgba(0,0,0,.35),
      inset 3px 3px 0 rgba(255,255,255,.15),
      0 4px 0 var(--forest-dark);
    transition:transform .08s ease, background .15s ease;
  }
  .menu-btn:hover{
    background:var(--leaf-glow);
    color:#0f2e22;
    transform:translateY(-2px);
  }
  .menu-btn:active{
    transform:translateY(2px);
    box-shadow:
      inset -3px -3px 0 rgba(0,0,0,.35),
      inset 3px 3px 0 rgba(255,255,255,.15),
      0 1px 0 var(--forest-dark);
  }
  .menu-btn::before{
    content:"✦";
    color:var(--gold);
    margin-right:10px;
    opacity:.8;
  }

  .footer-credit{
    position:absolute;
    bottom:14px;
    font-family:'VT323', monospace;
    font-size:15px;
    color:rgba(241,250,238,.55);
    letter-spacing:1px;
    z-index:2;
  }

  @media (max-width:480px){
    .menu-panel{ min-width:80vw; padding:18px 20px; }
    .menu-btn{ font-size:11px; padding:12px 14px; }
  }
</style>
</head>
<body>

  <div class="bg-scene"></div>
  <div class="bg-vignette"></div>

  <div class="stage">
    <div class="logo-wrap">
      <img class="logo-img" src="assets/images/logo.png" alt="Amazing Wizzy">
    </div>

    <div class="menu-panel">
      <button class="menu-btn" id="btn-start">เริ่มเกม</button>
      <button class="menu-btn" id="btn-settings">การตั้งค่า</button>
      <button class="menu-btn" id="btn-credits">ผู้สร้าง</button>
    </div>
  </div>

  <div class="footer-credit">Amazing Wizzy — v0.1 prototype</div>

  <script>
    // สร้างหิ่งห้อยแบบสุ่มตำแหน่งและจังหวะ
    const stage = document.querySelector('.stage');
    const fireflyCount = 18;
    for(let i=0;i<fireflyCount;i++){
      const f = document.createElement('div');
      f.className = 'firefly';
      f.style.left = Math.random()*100 + 'vw';
      f.style.top = (45 + Math.random()*50) + 'vh';
      f.style.animationDelay = (Math.random()*6) + 's';
      f.style.animationDuration = (4 + Math.random()*4) + 's';
      document.body.appendChild(f);
    }

    // ปุ่มเมนู (ยังไม่มีหน้าเกมจริง จึงแค่ log ไว้ก่อน)
    document.getElementById('btn-start').addEventListener('click', () => {
      console.log('เริ่มเกม: ยังไม่ได้สร้างหน้าเกม');
    });
    document.getElementById('btn-settings').addEventListener('click', () => {
      console.log('เปิดการตั้งค่า: ยังไม่ได้สร้างหน้านี้');
    });
    document.getElementById('btn-credits').addEventListener('click', () => {
      console.log('เปิดหน้าผู้สร้าง: ยังไม่ได้สร้างหน้านี้');
    });
  </script>

</body>
</html>
